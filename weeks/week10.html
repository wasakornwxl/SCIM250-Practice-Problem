<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SCIM 250 — Week 10 Practice</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- CodeMirror (editor) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>

<!-- Pyodide (Python in the browser) -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>

<!-- Supabase + shared auth (config first, then the guard) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/config.js"></script>
<script src="../shared/auth-guard.js"></script>

<style>
  :root{
    --bg:#11131c;
    --panel:#191c28;
    --panel-2:#20242f;
    --code-bg:#0c0e15;
    --ink:#ECEEF5;
    --muted:#9197AD;
    --line:#2A2E3F;
    --primary:#7C83FF;
    --primary-2:#9aa0ff;
    --success:#5BD6A0;
    --danger:#FF7A7A;
    --gold:#F5B945;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(124,131,255,.10), transparent 60%),
      radial-gradient(900px 500px at -5% 110%, rgba(245,185,69,.06), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:Inter,system-ui,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--primary-2);text-decoration:none}

  /* ---------- Header ---------- */
  header{
    display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;
    padding:20px 26px;border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:13px}
  .brand .logo{
    width:42px;height:42px;border-radius:11px;flex:none;
    background:linear-gradient(145deg,var(--primary),#5d63d6);
    display:grid;place-items:center;font-family:"JetBrains Mono",monospace;font-weight:600;
    color:#fff;box-shadow:0 6px 18px rgba(124,131,255,.35);
  }
  .brand h1{
    font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:1.18rem;margin:0;letter-spacing:-.01em;
  }
  .brand p{margin:2px 0 0;font-size:.8rem;color:var(--muted)}

  .whoami{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .backlink{font-size:.82rem;color:var(--muted)}
  .backlink:hover{color:var(--ink)}
  .scorepill{
    display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);
    padding:8px 14px;border-radius:999px;font-size:.86rem;
  }
  .scorepill b{font-family:"Space Grotesk",sans-serif;color:var(--gold);font-size:1rem}
  .who-name{font-size:.86rem;color:var(--muted)}
  .who-name b{color:var(--ink)}
  .btn-ghost{
    background:transparent;border:1px solid var(--line);color:var(--muted);
    padding:8px 13px;border-radius:9px;font-size:.8rem;cursor:pointer;font-family:inherit;
  }
  .btn-ghost:hover{color:var(--ink);border-color:#3a4056}

  /* ---------- Persistence banner ---------- */
  .banner{
    font-size:.82rem;padding:10px 26px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:8px;
  }
  .banner.local{background:rgba(245,185,69,.07);color:#e9c578}
  .banner.live{background:rgba(91,214,160,.07);color:var(--success)}
  .banner .dot{width:7px;height:7px;border-radius:50%;flex:none;background:currentColor}

  /* ---------- Layout ---------- */
  main{
    display:grid;grid-template-columns:330px 1fr;gap:0;
    min-height:calc(100vh - 84px);
  }
  @media(max-width:900px){ main{grid-template-columns:1fr} }

  /* ---------- Level rail (the signature) ---------- */
  .rail{
    border-right:1px solid var(--line);padding:22px 18px 40px;overflow-y:auto;
  }
  .rail-title{
    font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    margin:0 6px 16px;font-weight:600;
  }
  .level{position:relative;margin-bottom:6px}
  .level-head{
    display:flex;align-items:center;gap:11px;padding:8px 6px;
  }
  .level-node{
    width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;
    font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:.82rem;
    border:1px solid var(--line);background:var(--panel-2);color:var(--muted);
    z-index:1;transition:.2s;
  }
  .level.unlocked .level-node{color:var(--ink);border-color:#3a4056}
  .level.complete .level-node{
    background:linear-gradient(145deg,var(--gold),#d99a2a);color:#3a2a05;border-color:transparent;
    box-shadow:0 4px 14px rgba(245,185,69,.3);
  }
  .level-label{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:.92rem}
  .level-sub{font-size:.74rem;color:var(--muted);margin-top:1px}
  .level.locked .level-label,.level.locked .level-sub{color:#5a6076}

  /* connector line between levels */
  .level::before{
    content:"";position:absolute;left:20.5px;top:38px;bottom:-6px;width:2px;background:var(--line);
  }
  .level:last-child::before{display:none}
  .level.complete::before{background:linear-gradient(var(--gold),var(--line))}

  .tasks{margin:2px 0 8px 41px;display:flex;flex-direction:column;gap:4px}
  .task{
    display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;
    cursor:pointer;font-size:.86rem;color:var(--ink);border:1px solid transparent;transition:.12s;
  }
  .task:hover{background:var(--panel)}
  .task.active{background:var(--panel);border-color:var(--primary)}
  .task .check{
    width:17px;height:17px;border-radius:50%;flex:none;border:1.5px solid var(--line);
    display:grid;place-items:center;font-size:.62rem;color:transparent;
  }
  .task.done .check{background:var(--success);border-color:var(--success);color:#06351f}
  .task.locked{cursor:not-allowed;color:#5a6076}
  .task.locked:hover{background:transparent}
  .lockicon{margin-left:auto;font-size:.78rem;opacity:.6}

  /* ---------- Workspace ---------- */
  .workspace{padding:26px 30px 60px;max-width:920px}
  .prompt-card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 24px;margin-bottom:18px;
  }
  .prompt-card .eyebrow{
    font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--primary-2);
    font-weight:600;margin-bottom:8px;
  }
  .prompt-card h2{
    font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:1.34rem;margin:0 0 12px;letter-spacing:-.01em;
  }
  .prompt-card p{margin:0 0 10px;line-height:1.6;color:#cdd1e0;font-size:.95rem}
  .prompt-card code{
    font-family:"JetBrains Mono",monospace;background:var(--code-bg);padding:2px 6px;border-radius:5px;
    font-size:.85em;color:var(--gold);
  }
  .examples{margin-top:6px;font-family:"JetBrains Mono",monospace;font-size:.82rem;color:var(--muted)}
  .examples div{padding:2px 0}

  .editor-shell{
    border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--code-bg);
  }
  .editor-bar{
    display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
    border-bottom:1px solid var(--line);
  }
  .editor-bar .fname{font-family:"JetBrains Mono",monospace;font-size:.8rem;color:var(--muted)}
  .editor-bar .dots{display:flex;gap:6px}
  .editor-bar .dots i{width:11px;height:11px;border-radius:50%;display:block}
  .CodeMirror{height:auto;min-height:220px;font-family:"JetBrains Mono",monospace;font-size:14px}
  .CodeMirror-scroll{min-height:220px}

  .actions{display:flex;align-items:center;gap:12px;margin-top:16px;flex-wrap:wrap}
  .btn-run{
    background:linear-gradient(145deg,var(--primary),#5d63d6);color:#fff;border:none;
    padding:12px 24px;border-radius:10px;font-size:.92rem;font-weight:600;cursor:pointer;
    font-family:"Space Grotesk",sans-serif;display:flex;align-items:center;gap:9px;
    box-shadow:0 6px 18px rgba(124,131,255,.3);transition:.15s;
  }
  .btn-run:hover:not(:disabled){transform:translateY(-1px)}
  .btn-run:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
  .btn-reset{background:transparent;border:1px solid var(--line);color:var(--muted);
    padding:12px 16px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:.86rem}
  .btn-reset:hover{color:var(--ink)}
  .runstate{font-size:.84rem;color:var(--muted)}

  /* ---------- Results ---------- */
  .results{margin-top:20px}
  .result-summary{
    display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:11px;margin-bottom:12px;
    font-family:"Space Grotesk",sans-serif;font-weight:600;
  }
  .result-summary.pass{background:rgba(91,214,160,.1);border:1px solid rgba(91,214,160,.3);color:var(--success)}
  .result-summary.fail{background:rgba(255,122,122,.08);border:1px solid rgba(255,122,122,.25);color:var(--danger)}
  .result-summary .big{font-size:1.5rem}
  .test-row{
    display:flex;align-items:flex-start;gap:11px;padding:10px 14px;border:1px solid var(--line);
    border-radius:9px;margin-bottom:7px;font-family:"JetBrains Mono",monospace;font-size:.82rem;background:var(--panel);
  }
  .test-row .tick{flex:none;font-weight:700}
  .test-row.ok .tick{color:var(--success)}
  .test-row.no .tick{color:var(--danger)}
  .test-row .detail{color:var(--muted);line-height:1.5;word-break:break-word}
  .test-row .detail b{color:var(--ink);font-weight:500}

  .empty{
    color:var(--muted);font-size:.9rem;padding:30px;text-align:center;border:1px dashed var(--line);
    border-radius:var(--radius);line-height:1.6;
  }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(120px);
    background:linear-gradient(145deg,var(--gold),#d99a2a);color:#3a2a05;
    padding:14px 24px;border-radius:12px;font-family:"Space Grotesk",sans-serif;font-weight:600;
    box-shadow:0 10px 34px rgba(0,0,0,.4);transition:.4s cubic-bezier(.2,.9,.3,1.2);z-index:100;
    display:flex;align-items:center;gap:10px;
  }
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* ---------- Identity modal ---------- */
  .modal-bg{
    position:fixed;inset:0;background:rgba(8,9,14,.78);backdrop-filter:blur(4px);
    display:grid;place-items:center;z-index:200;padding:20px;
  }
  .modal{
    background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:32px;
    width:100%;max-width:400px;
  }
  .modal h2{font-family:"Space Grotesk",sans-serif;margin:0 0 6px;font-size:1.3rem}
  .modal p{margin:0 0 22px;color:var(--muted);font-size:.88rem;line-height:1.5}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:6px}
  .field input{
    width:100%;background:var(--code-bg);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;color:var(--ink);font-family:inherit;font-size:.95rem;
  }
  .field input:focus{outline:none;border-color:var(--primary)}
  .modal .btn-run{width:100%;justify-content:center;margin-top:8px}

  .spin{
    width:15px;height:15px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
    border-radius:50%;animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* SQL result tables */
  .rowsbox{margin-top:12px}
  .rowslabel{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .resulttbl{border-collapse:collapse;font-family:"JetBrains Mono",monospace;font-size:.82rem;background:var(--panel)}
  .resulttbl td{border:1px solid var(--line);padding:5px 12px;color:var(--ink)}
  .emptyrows{color:var(--muted);font-size:.82rem;padding:6px 2px}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">py</div>
    <div>
      <h1>SCIM 250 · Week 10</h1>
      <p>Advanced SQL</p>
    </div>
  </div>
  <div class="whoami">
    <a class="backlink" href="../index.html">← All weeks</a>
    <div class="scorepill">⭐ <b id="scoreVal">0</b> pts</div>
    <div class="who-name">Signed in as <b id="whoName">…</b></div>
    <button class="btn-ghost" id="signOutBtn">Sign out</button>
  </div>
</header>

<div class="banner" id="banner"></div>

<main>
  <aside class="rail">
    <div class="rail-title">Your path</div>
    <div id="railBody"></div>
  </aside>

  <section class="workspace" id="workspace">
    <div class="empty">Checking your sign-in and loading the SQL engine…</div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   SCIM 250 — SQL Practice Tracker (Week 9)
   Real SQL runs in the browser via Pyodide's built-in sqlite3.
   Students write a SELECT query; it runs against a fixed in-browser
   database and the result rows are compared to the expected answer.
   Scores are recorded but not exam-proof (browser-side grading).
   ---------------------------------------------------------------------
   Paste your Supabase URL + publishable/anon key to record attempts.
   ===================================================================== */
// Supabase client + verified student are provided by the shared auth guard (SCIM_AUTH).

/* The database every problem queries. */
const SETUP_SQL = `
CREATE TABLE penguins (id INTEGER, species TEXT, island TEXT, body_mass_g INTEGER, sex TEXT);
INSERT INTO penguins VALUES
 (1,'Adelie','Torgersen',3750,'male'),
 (2,'Adelie','Biscoe',3800,'female'),
 (3,'Adelie','Dream',3250,'female'),
 (4,'Gentoo','Biscoe',5000,'male'),
 (5,'Gentoo','Biscoe',5100,'female'),
 (6,'Chinstrap','Dream',3700,'female'),
 (7,'Chinstrap','Dream',3900,'male'),
 (8,'Gentoo','Biscoe',4900,'male');
CREATE TABLE islands (island TEXT, region TEXT);
INSERT INTO islands VALUES ('Torgersen','Palmer'),('Biscoe','Palmer'),('Dream','Palmer'),('Faro','Palmer');
`;

const SCHEMA_HTML = `<b>penguins</b>(id, species, island, body_mass_g, sex) &nbsp;·&nbsp; <b>islands</b>(island, region)`;

const LEVELS = [
  {
    "name": "Level 1 · Subqueries & Joins",
    "sub": "Scalar/IN subqueries, LEFT JOIN, HAVING with a subquery",
    "problems": [
      {
        "id": "w10p1",
        "title": "Compare to a subquery",
        "prompt": "Return the <code>species</code> and <code>body_mass_g</code> of penguins heavier than the <b>overall average</b> mass. Hint: <code>WHERE body_mass_g &gt; (SELECT AVG(body_mass_g) FROM penguins)</code>.",
        "starter": "SELECT species, body_mass_g\nFROM penguins\nWHERE body_mass_g > (SELECT ... FROM penguins);",
        "expected": [
          [
            "Gentoo",
            5000
          ],
          [
            "Gentoo",
            5100
          ],
          [
            "Gentoo",
            4900
          ]
        ],
        "ordered": false
      },
      {
        "id": "w10p2",
        "title": "Filter with IN (subquery)",
        "prompt": "Return the <code>island</code> and <code>region</code> of islands that have at least one <code>Gentoo</code> penguin. Hint: <code>WHERE island IN (SELECT island FROM penguins WHERE species='Gentoo')</code>.",
        "starter": "SELECT island, region\nFROM islands\nWHERE island IN (SELECT ... );",
        "expected": [
          [
            "Biscoe",
            "Palmer"
          ]
        ],
        "ordered": false
      },
      {
        "id": "w10p3",
        "title": "LEFT JOIN keeps every island",
        "prompt": "Return every island and how many penguins are on it, <b>including islands with zero</b> penguins (note: island 'Faro' has none). Hint: <code>islands i LEFT JOIN penguins p ON i.island=p.island</code>, then <code>COUNT(p.id)</code>.",
        "starter": "SELECT i.island, COUNT(p.id)\nFROM islands i\nLEFT JOIN penguins p ON i.island = p.island\nGROUP BY i.island;",
        "expected": [
          [
            "Biscoe",
            4
          ],
          [
            "Dream",
            3
          ],
          [
            "Faro",
            0
          ],
          [
            "Torgersen",
            1
          ]
        ],
        "ordered": false
      },
      {
        "id": "w10p4",
        "title": "Match the maximum (subquery)",
        "prompt": "Return the <code>species</code> of the single heaviest penguin, using a subquery for the maximum mass. Hint: <code>WHERE body_mass_g = (SELECT MAX(body_mass_g) FROM penguins)</code>.",
        "starter": "SELECT species\nFROM penguins\nWHERE body_mass_g = (SELECT ... FROM penguins);",
        "expected": [
          [
            "Gentoo"
          ]
        ],
        "ordered": false
      },
      {
        "id": "w10p5",
        "title": "HAVING with a subquery",
        "prompt": "Return the <code>species</code> whose <b>average</b> mass exceeds the <b>overall average</b> mass. Hint: <code>GROUP BY species HAVING AVG(body_mass_g) &gt; (SELECT AVG(body_mass_g) FROM penguins)</code>.",
        "starter": "SELECT species\nFROM penguins\nGROUP BY species\nHAVING AVG(body_mass_g) > (SELECT ... FROM penguins);",
        "expected": [
          [
            "Gentoo"
          ]
        ],
        "ordered": false
      }
    ]
  },
  {
    "name": "Level 2 · Window Functions",
    "sub": "RANK, ROW_NUMBER, running totals, PARTITION BY, CTE",
    "problems": [
      {
        "id": "w10p6",
        "title": "Rank by mass",
        "prompt": "For each penguin return its <code>id</code> and its <b>rank</b> by <code>body_mass_g</code> (heaviest = rank 1), ordered by <code>id</code>. Hint: <code>RANK() OVER (ORDER BY body_mass_g DESC)</code>.",
        "starter": "SELECT id, RANK() OVER (ORDER BY body_mass_g DESC) AS rnk\nFROM penguins\nORDER BY id;",
        "expected": [
          [
            1,
            6
          ],
          [
            2,
            5
          ],
          [
            3,
            8
          ],
          [
            4,
            2
          ],
          [
            5,
            1
          ],
          [
            6,
            7
          ],
          [
            7,
            4
          ],
          [
            8,
            3
          ]
        ],
        "ordered": true
      },
      {
        "id": "w10p7",
        "title": "Row number within group",
        "prompt": "For each penguin return its <code>id</code> and its rank <b>within its own species</b> by mass (heaviest = 1), ordered by <code>id</code>. Hint: <code>ROW_NUMBER() OVER (PARTITION BY species ORDER BY body_mass_g DESC)</code>.",
        "starter": "SELECT id, ROW_NUMBER() OVER (PARTITION BY ... ORDER BY body_mass_g DESC) AS rn\nFROM penguins\nORDER BY id;",
        "expected": [
          [
            1,
            2
          ],
          [
            2,
            1
          ],
          [
            3,
            3
          ],
          [
            4,
            2
          ],
          [
            5,
            1
          ],
          [
            6,
            2
          ],
          [
            7,
            1
          ],
          [
            8,
            3
          ]
        ],
        "ordered": true
      },
      {
        "id": "w10p8",
        "title": "Running total",
        "prompt": "Return each <code>id</code> and the <b>running total</b> of <code>body_mass_g</code> ordered by <code>id</code>. Hint: <code>SUM(body_mass_g) OVER (ORDER BY id)</code>.",
        "starter": "SELECT id, SUM(body_mass_g) OVER (ORDER BY id) AS running\nFROM penguins\nORDER BY id;",
        "expected": [
          [
            1,
            3750
          ],
          [
            2,
            7550
          ],
          [
            3,
            10800
          ],
          [
            4,
            15800
          ],
          [
            5,
            20900
          ],
          [
            6,
            24600
          ],
          [
            7,
            28500
          ],
          [
            8,
            33400
          ]
        ],
        "ordered": true
      },
      {
        "id": "w10p9",
        "title": "Group average alongside each row",
        "prompt": "Return each <code>id</code> and the <b>average mass of its species</b> (as a window, without collapsing rows), ordered by <code>id</code>. Hint: <code>AVG(body_mass_g) OVER (PARTITION BY species)</code>.",
        "starter": "SELECT id, AVG(body_mass_g) OVER (PARTITION BY species) AS sp_avg\nFROM penguins\nORDER BY id;",
        "expected": [
          [
            1,
            3600.0
          ],
          [
            2,
            3600.0
          ],
          [
            3,
            3600.0
          ],
          [
            4,
            5000.0
          ],
          [
            5,
            5000.0
          ],
          [
            6,
            3800.0
          ],
          [
            7,
            3800.0
          ],
          [
            8,
            5000.0
          ]
        ],
        "ordered": true
      },
      {
        "id": "w10p10",
        "title": "Top per group (CTE + window)",
        "prompt": "Using a CTE that numbers penguins within each species by mass, return each <code>species</code> and the <code>id</code> of its <b>heaviest</b> penguin, ordered by <code>species</code>.",
        "starter": "WITH ranked AS (\n  SELECT id, species,\n         ROW_NUMBER() OVER (PARTITION BY species ORDER BY body_mass_g DESC) AS rn\n  FROM penguins\n)\nSELECT species, id FROM ranked WHERE rn = 1 ORDER BY species;",
        "expected": [
          [
            "Adelie",
            2
          ],
          [
            "Chinstrap",
            7
          ],
          [
            "Gentoo",
            5
          ]
        ],
        "ordered": true
      }
    ]
  }
];

const flatProblems = LEVELS.flatMap((lv,i)=>lv.problems.map(p=>({...p, level:i+1})));
const POINTS_PER_PROBLEM = 10;

let pyodide=null, supa=null, editor=null, current=null;
let student={id:null,email:null,name:null};
let completed=new Set();
let sessionCode={};

window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("signOutBtn").addEventListener("click", async () => {
    try { if (supa) await supa.auth.signOut(); } catch(e){}
    location.replace("../index.html");
  });
  loadEngine();
  initAuth();
});

async function initAuth(){
  const banner=document.getElementById("banner");
  // SCIM_AUTH.ready resolves only for a signed-in Mahidol account; otherwise
  // the guard has already redirected this page to the landing screen.
  const { supa: s, student: st } = await SCIM_AUTH.ready;
  supa = s; student = st;
  document.getElementById("whoName").textContent = student.name;
  banner.className="banner live";
  banner.innerHTML='<span class="dot"></span> Signed in as ' + student.email + ' — every attempt and score is saved.';
  completed=new Set();
  await restoreProgress();
  renderRail();
  selectFirstAvailable();
}

async function loadEngine(){
  pyodide = await loadPyodide();
  try { await pyodide.loadPackagesFromImports("import sqlite3"); } catch (e) { console.warn("pkg load:", e); }
  try {
  pyodide.runPython(`
import json, sqlite3

def _run_sql(setup_sql, student_sql, expected_json, ordered):
    expected = json.loads(expected_json)
    con = sqlite3.connect(":memory:")
    cur = con.cursor()
    try:
        cur.executescript(setup_sql)
    except Exception as e:
        con.close(); return json.dumps({"ok": False, "error": "Database setup error: " + str(e)})
    try:
        cur.execute(student_sql)
        rows = [list(r) for r in cur.fetchall()]
    except Exception as e:
        con.close(); return json.dumps({"ok": False, "error": "Your SQL has an error: " + str(e)})
    con.close()
    def keyf(r): return json.dumps(r, default=str)
    def norm(rs): return rs if ordered else sorted(rs, key=keyf)
    def eqrow(a, b):
        if len(a) != len(b): return False
        for x, y in zip(a, b):
            if isinstance(x,(int,float)) and not isinstance(x,bool) and isinstance(y,(int,float)) and not isinstance(y,bool):
                if abs(x - y) > 1e-6: return False
            elif x != y: return False
        return True
    g = norm(rows); e = norm(expected)
    passed = (len(g) == len(e)) and all(eqrow(a, b) for a, b in zip(g, e))
    return json.dumps({"ok": True, "passed": passed, "got": rows})
`);
  } catch (e) {
    const b=document.getElementById("banner"); if(b){ b.className="banner local"; b.innerHTML="\u26a0\ufe0f Engine error loading the SQL database: "+e.message; }
    console.error("harness define failed:", e);
  }
  if (current) enableRun();
}

async function restoreProgress(){
  if(!supa||!student.id) return;
  try{
    const {data,error}=await supa.from("attempts").select("problem_id").eq("user_id",student.id).eq("passed",true);
    if(!error&&data) data.forEach(r=>completed.add(r.problem_id));
  }catch(e){ console.warn("restore failed", e); }
  updateScore();
}
async function recordAttempt(problem, passed, code){
  if(!supa||!student.id) return;
  try{
    await supa.from("attempts").insert({
      user_id:student.id, email:student.email, full_name:student.name, problem_id:problem.id,
      level:problem.level, passed:passed, score:passed?1:0, total_tests:1, code:code
    });
  }catch(e){ console.warn("record failed", e); }
}

function isLevelUnlocked(i){ return i===0 || LEVELS[i-1].problems.every(p=>completed.has(p.id)); }
function isLevelComplete(i){ return LEVELS[i].problems.every(p=>completed.has(p.id)); }

function renderRail(){
  const body=document.getElementById("railBody"); body.innerHTML="";
  LEVELS.forEach((lv,i)=>{
    const unlocked=isLevelUnlocked(i), complete=isLevelComplete(i);
    const div=document.createElement("div");
    div.className="level "+(complete?"complete":unlocked?"unlocked":"locked");
    div.innerHTML=`
      <div class="level-head">
        <div class="level-node">${complete?"✓":i+1}</div>
        <div><div class="level-label">${lv.name}</div>
        <div class="level-sub">${unlocked?lv.sub:"Finish the level above to unlock"}</div></div>
      </div><div class="tasks"></div>`;
    const tasks=div.querySelector(".tasks");
    lv.problems.forEach(p=>{
      const done=completed.has(p.id);
      const t=document.createElement("div");
      t.className="task"+(done?" done":"")+(unlocked?"":" locked")+(current&&current.id===p.id?" active":"");
      t.innerHTML=`<span class="check">✓</span><span>${p.title}</span>`+(unlocked?"":`<span class="lockicon">🔒</span>`);
      if(unlocked) t.addEventListener("click",()=>selectProblem(p.id));
      tasks.appendChild(t);
    });
    body.appendChild(div);
  });
}
function selectFirstAvailable(){
  for(let i=0;i<LEVELS.length;i++){
    if(!isLevelUnlocked(i)) break;
    for(const p of LEVELS[i].problems){ if(!completed.has(p.id)){ selectProblem(p.id); return; } }
  }
  selectProblem(flatProblems[0].id);
}

function selectProblem(id){
  const p=flatProblems.find(x=>x.id===id); if(!p) return;
  current=p;
  const ws=document.getElementById("workspace");
  ws.innerHTML=`
    <div class="prompt-card">
      <div class="eyebrow">${LEVELS[p.level-1].name}</div>
      <h2>${p.title}</h2>
      <p>${p.prompt}</p>
      <div class="examples">Database: ${SCHEMA_HTML}</div>
    </div>
    <div class="editor-shell">
      <div class="editor-bar">
        <div class="dots"><i style="background:#ff5f57"></i><i style="background:#febc2e"></i><i style="background:#28c840"></i></div>
        <span class="fname">query.sql</span>
      </div>
      <textarea id="code"></textarea>
    </div>
    <div class="actions">
      <button class="btn-run" id="runBtn" disabled><span id="runIcon">▶</span> <span id="runText">Run query</span></button>
      <button class="btn-reset" id="resetBtn">Reset</button>
      <span class="runstate" id="runState"></span>
    </div>
    <div class="results" id="results"></div>`;
  const ta=document.getElementById("code");
  ta.value=sessionCode[p.id] ?? p.starter;
  editor=CodeMirror.fromTextArea(ta,{ mode:"text/x-sql", theme:"material-darker", lineNumbers:true, autofocus:true });
  editor.on("change",()=>{ sessionCode[p.id]=editor.getValue(); });
  document.getElementById("runBtn").addEventListener("click", runQuery);
  document.getElementById("resetBtn").addEventListener("click", ()=>{ editor.setValue(p.starter); sessionCode[p.id]=p.starter; document.getElementById("results").innerHTML=""; });
  if(pyodide) enableRun();
  renderRail();
}
function enableRun(){ const b=document.getElementById("runBtn"); if(b) b.disabled=false; }

async function runQuery(){
  if(!pyodide||!current) return;
  const btn=document.getElementById("runBtn"), icon=document.getElementById("runIcon"), text=document.getElementById("runText");
  const code=editor.getValue();
  btn.disabled=true; icon.outerHTML='<span class="spin" id="runIcon"></span>'; text.textContent="Running…";
  await new Promise(r=>setTimeout(r,30));
  let parsed;
  try{
    pyodide.globals.set("setup_sql", SETUP_SQL);
    pyodide.globals.set("student_sql", code);
    pyodide.globals.set("expected_json", JSON.stringify(current.expected));
    pyodide.globals.set("ordered", !!current.ordered);
    const out=pyodide.runPython("_run_sql(setup_sql, student_sql, expected_json, ordered)");
    parsed=JSON.parse(out);
  }catch(e){ parsed={ok:false,error:"Something went wrong: "+e.message}; }
  document.getElementById("runIcon").outerHTML='<span id="runIcon">▶</span>';
  document.getElementById("runText").textContent="Run query";
  btn.disabled=false;
  renderResults(parsed, code);
}

function tableHtml(rows){
  if(!rows || rows.length===0) return '<div class="emptyrows">(no rows)</div>';
  let h='<table class="resulttbl"><tbody>';
  rows.slice(0,50).forEach(r=>{ h+='<tr>'+r.map(c=>`<td>${c===null?'<i>NULL</i>':String(c)}</td>`).join('')+'</tr>'; });
  h+='</tbody></table>';
  if(rows.length>50) h+=`<div class="emptyrows">… ${rows.length-50} more rows</div>`;
  return h;
}

function renderResults(parsed, code){
  const box=document.getElementById("results");
  if(!parsed.ok){
    box.innerHTML=`<div class="result-summary fail"><span class="big">✕</span> ${parsed.error}</div>`;
    recordAttempt(current,false,code);
    return;
  }
  if(parsed.passed){
    box.innerHTML=`<div class="result-summary pass"><span class="big">✓</span> Correct! Your query returns the right rows.</div>
      <div class="rowsbox"><div class="rowslabel">Your result</div>${tableHtml(parsed.got)}</div>`;
    if(!completed.has(current.id)){
      const wasDone=isLevelComplete(current.level-1);
      completed.add(current.id); updateScore();
      const nowDone=isLevelComplete(current.level-1); renderRail();
      if(!wasDone&&nowDone){
        if(current.level<LEVELS.length) showToast(`🎉 Level ${current.level} complete — Level ${current.level+1} unlocked!`);
        else showToast(`🏆 You finished every level. Outstanding!`);
      } else showToast(`✓ Solved! +${POINTS_PER_PROBLEM} points`);
    }
  } else {
    box.innerHTML=`<div class="result-summary fail"><span class="big">✕</span> Not quite — the rows don't match the expected answer.</div>
      <div class="rowsbox"><div class="rowslabel">Your result</div>${tableHtml(parsed.got)}</div>
      <div class="rowsbox"><div class="rowslabel">Expected</div>${tableHtml(current.expected)}</div>`;
  }
  recordAttempt(current, parsed.passed, code);
}

function updateScore(){ document.getElementById("scoreVal").textContent=completed.size*POINTS_PER_PROBLEM; }

let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),3200);
}

</script>
</body>
</html>
